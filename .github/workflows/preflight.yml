# ─────────────────────────────────────────────────────────────────────────────
# Pre-flight — NewTripoli MCP Worker  (CIGOLD-PARITY-SPEC §1.4.1)
#
# Offline-green validation of the committed worker + kernels before any Cloudflare
# deploy. Pure `node` steps — NO wrangler dev in preflight itself.
#
# Jobs (in order): preflight (syntax → server.json shape → hash/buildid primitives
# frozen → canon-sync → manifest-sync → §17 kernel-digest → golden drift →
# Tier-A kernel fixtures → chain-golden drift) → deploy (Cloudflare, main pushes
# only) → smoke (post-deploy live /mcp check, main pushes only). deploy/smoke
# mirror PostOakLabs/ocs-mcp-worker's preflight.yml in shape (DEPLOY-WIRE.build).
# ─────────────────────────────────────────────────────────────────────────────

name: Pre-flight — NewTripoli MCP Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Validate worker + kernels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"          # Wrangler 4.x requires Node >=22

      - name: Install dependencies
        run: npm ci

      # 1. Syntax — parse every kernel, the worker, both libs, and every script.
      - name: Syntax — node --check
        run: |
          set -e
          for f in kernels/*.kernel.mjs worker.mjs lib/_hash.mjs lib/_buildid.mjs scripts/*.mjs; do
            node --check "$f"
          done

      # 2. server.json identity shape (SCAFFOLD-1/HASHWIRE-set fields).
      - name: server.json shape
        run: |
          node -e '
            const s = JSON.parse(require("fs").readFileSync("server.json","utf8"));
            const j = JSON.stringify(s);
            const need = [
              ["name", s.name === "me.newtripoli/tools"],
              ["mcp endpoint", j.includes("mcp.newtripoli.xyz/mcp")],
              ["websiteUrl", j.includes("https://newtripoli.xyz")],
              ["repository", j.includes("github.com/PostOakLabs/newtripoli-mcp-worker")],
            ];
            const bad = need.filter(([,ok]) => !ok).map(([k]) => k);
            if (bad.length) { console.error("::error::server.json missing/incorrect: " + bad.join(", ")); process.exit(1); }
            console.log("OK  server.json identity fields present");
          '

      # 3. Hash + build-identity primitives are byte-frozen. The workflow has no
      #    scratch reference in CI, so freshness is enforced by the self-referential
      #    §17 digest (step 5) + the golden gate (step 6); here we only assert the
      #    files exist and parse (covered by step 1) and carry their expected exports.
      - name: Hash/buildid primitives present
        run: |
          node -e '
            const h = require("fs").readFileSync("lib/_hash.mjs","utf8");
            const b = require("fs").readFileSync("lib/_buildid.mjs","utf8");
            if (!/export\s+async\s+function\s+executionHash/.test(h)) { console.error("::error::lib/_hash.mjs missing executionHash export"); process.exit(1); }
            if (!/export\s+async\s+function\s+sourceDigest/.test(b)) { console.error("::error::lib/_buildid.mjs missing sourceDigest export"); process.exit(1); }
            console.log("OK  hash/buildid primitives export intact");
          '

      # 4. Canon-sync — CANON_VERSION lockstep + 14 vendored kernel consts == canon.
      - name: Canon-sync gate
        run: node scripts/check-canon-sync.mjs

      # 4b. Manifest-sync — data/tools-manifest.json tool/chain keys, per-step order,
      #     and mandates stay in lockstep with worker.mjs's KERNEL_REGISTRY/CHAINS.
      - name: Manifest-sync gate
        run: node scripts/check-manifest-sync.mjs

      # 5. §17 kernel-digest freshness (self-referential over worker.mjs).
      - name: §17 kernel-digest freshness
        run: node scripts/check-kernel-digest.mjs

      # 6. Golden-hash drift — recompute L1 goldens at fixture defaults vs committed.
      - name: Golden-hash drift gate
        run: node scripts/check-goldens.mjs

      # 7. Tier-A kernel-fixture unit — L1 §6.4 parity anchors. Pure import.
      - name: Test — kernel fixtures (Tier A)
        run: node --test scripts/tests/tier-a-kernels.test.mjs

      # 8. Chain composite-golden drift — recompute 12 chain-branch composites vs frozen.
      - name: Chain-golden drift gate
        run: node scripts/check-chain-goldens.mjs

  # ── Deploy ────────────────────────────────────────────────────────────────
  # Real deploy via GitHub Actions + wrangler-action (NOT a Cloudflare GitHub
  # App). Gated on preflight, main pushes only. A failed deploy leaves the
  # live worker untouched. wrangler.jsonc already carries name/assets/routes/
  # custom_domain (mcp.newtripoli.xyz) — no config change needed here. Needs
  # repo secrets CLOUDFLARE_API_TOKEN (Workers-deploy scoped) and
  # CLOUDFLARE_ACCOUNT_ID (TIM-CF-SECRETS, one-time, external).
  deploy:
    name: Deploy to Cloudflare Workers
    needs: preflight
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"          # Wrangler 4.99 requires Node >=22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.99.0"
          command: deploy

  # ── Post-deploy smoke ───────────────────────────────────────────────────────
  # Assert the LIVE /mcp handshake works and serves the kernel tools this build
  # registered. Expected kernel-tool names are read from the committed
  # data/tools-manifest.json (generate.mjs emits it from KERNEL_REGISTRY), NOT by
  # importing worker.mjs — worker.mjs imports @modelcontextprotocol/sdk at module
  # scope and this job runs no `npm ci`, so an import throws ERR_MODULE_NOT_FOUND
  # even when the live deploy is healthy. Mirrors ocs-mcp-worker + ainumbers smoke
  # jobs (read count from a committed generated data file, never from worker.mjs).
  # Regenerating the manifest self-updates the count (13 -> 18 when alt-history
  # kernels land) with no edit here.
  smoke:
    name: Post-deploy MCP smoke
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Assert live /mcp matches committed KERNEL_REGISTRY
        run: |
          set -euo pipefail
          ENDPOINT="https://mcp.newtripoli.xyz/mcp"
          ACCEPT="application/json, text/event-stream"
          # Give the new Cloudflare version a moment to propagate globally.
          sleep 15

          mcp_call () {  # $1 = json-rpc body ; writes parsed JSON to $2
            local body="$1" out="$2" raw status body_raw attempt=0 max=5
            # Cloudflare WAF rate-limits /mcp (per-IP). curl --retry does not reliably
            # retry 429, so loop explicitly on 429/503/000 (mirrors ainumbers ci.yml).
            while :; do
              raw=$(curl -s -w '\n%{http_code}' -X POST "$ENDPOINT" \
                      -H "Content-Type: application/json" -H "Accept: ${ACCEPT}" \
                      --max-time 25 -d "$body")
              status=$(printf '%s' "$raw" | tail -1)
              body_raw=$(printf '%s' "$raw" | sed '$d')
              if [ "$status" = "200" ]; then break; fi
              if { [ "$status" = "429" ] || [ "$status" = "503" ] || [ "$status" = "000" ]; } && [ "$attempt" -lt "$max" ]; then
                attempt=$((attempt + 1))
                echo "WAF/transient HTTP $status from $ENDPOINT — retry $attempt/$max after 6s" >&2
                sleep 6
                continue
              fi
              echo "::error::$out: HTTP $status from $ENDPOINT"
              exit 1
            done
            # Streamable-HTTP replies as SSE ("data: {…}") or plain JSON — normalise.
            printf '%s' "$body_raw" | sed -n 's/^data: //p' | head -1 > "$out"
            [ -s "$out" ] || printf '%s' "$body_raw" > "$out"
          }

          mcp_call '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"deploy-smoke","version":"1.0"}}}' /tmp/init.json
          mcp_call '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' /tmp/list.json

          node -e '
            (async () => {
              const { readFileSync } = await import("node:fs");
              const init = JSON.parse(readFileSync("/tmp/init.json", "utf8"));
              if (!init.result || !init.result.serverInfo) {
                console.error("::error::initialize did not return a result.serverInfo");
                process.exit(1);
              }
              console.log("OK  initialize handshake:", init.result.serverInfo.name);

              // Expected kernel-tool names come from the COMMITTED data/tools-manifest.json
              // (generate.mjs emits it from KERNEL_REGISTRY). We deliberately do NOT import
              // worker.mjs — it imports @modelcontextprotocol/sdk at module scope and this
              // job runs no `npm ci`, so the import throws ERR_MODULE_NOT_FOUND even on a
              // healthy deploy. Mirrors ocs-mcp-worker + ainumbers smoke jobs.
              const manifest = JSON.parse(readFileSync("data/tools-manifest.json", "utf8"));
              const expectedKernelNames = new Set(Object.values(manifest.tools).map(t => t.tool_id));
              const expectedKernelCount = expectedKernelNames.size;

              const list = JSON.parse(readFileSync("/tmp/list.json", "utf8"));
              const names = (list.result?.tools ?? []).map(t => t.name);
              const liveKernelNames = names.filter(n => expectedKernelNames.has(n));

              if (liveKernelNames.length !== expectedKernelCount) {
                const missing = [...expectedKernelNames].filter(n => !names.includes(n));
                console.error(`::error::live /mcp exposes ${liveKernelNames.length}/${expectedKernelCount} committed kernel tools (missing: ${missing.join(", ") || "none"})`);
                process.exit(1);
              }
              console.log(`OK  kernel tools live: ${liveKernelNames.length}/${expectedKernelCount} == committed data/tools-manifest.json`);
            })();
          '
